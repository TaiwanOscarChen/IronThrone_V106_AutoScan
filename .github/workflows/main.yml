name: IronThrone_V106_Daily_Scan

on:
  schedule:
    - cron: '30 0 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-22.04  # 🛡️ RCA對策：退回最穩定的 22.04 版本，避開 24.04 的網路斷線災情
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 建立 Python 淨室環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 檢查並掛載自動化組件
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else echo "找不到 requirements.txt，請確認檔案位置！"; exit 1; fi

      - name: 執行獅王戰神決策分析
        run: |
          if [ -f test_db.py ]; then python test_db.py; else echo "找不到 test_db.py，請確認檔案位置！"; exit 1; fi
