name: IronThrone_V106_Daily_Scan

on:
  schedule:
    # 台北時間 08:30 (開盤前)、14:00 (收盤後)、20:00 (夜盤初)
    - cron: '30 0 * * 1-5'  # UTC 00:30
    - cron: '0 6 * * 1-5'   # UTC 06:00
    - cron: '0 12 * * 1-5'  # UTC 12:00
  workflow_dispatch:        # 允許隨時手動點擊「強制巡檢」

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 建立 Python 淨室環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 掛載自動化組件 (RCA 防呆)
        run: pip install -r requirements.txt

      - name: 執行獅王戰神決策分析
        run: python test_db.py
