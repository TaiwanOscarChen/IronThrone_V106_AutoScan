name: IronThrone_V106_Daily_Scan

on:
  schedule:
    - cron: '30 0 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-22.04
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 🔍 [系統診斷] 掃描當前目錄檔案清單
        run: |
          echo "當前伺服器目錄路徑："
          pwd
          echo "目錄下的真實檔案清單："
          ls -la

      - name: 建立 Python 運算環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 檢查並掛載策略所需套件
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          else 
            echo "❌ 嚴重錯誤：找不到 requirements.txt。請檢查檔名大小寫，或是否放在正確目錄！"
            exit 1
          fi

      - name: 執行全方位量化與決策分析
        run: |
          if [ -f test_db.py ]; then 
            python test_db.py
          else 
            echo "❌ 嚴重錯誤：找不到 test_db.py。請檢查檔名大小寫，或是否放在正確目錄！"
            exit 1
          fi
