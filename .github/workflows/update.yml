name: LionKing Data Sync

on:
  schedule:
    # Taiwan market-hours refresh, every 30 minutes, Monday-Friday.
    # UTC 01:00-06:30 = Taiwan 09:00-14:30.
    - cron: '*/30 1-6 * * 1-5'
    # Taiwan 15:30 final after-market pass.
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LionKing crawler and strategy engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python update_strategy_data.py
