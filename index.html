<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獅王戰神 V108 終極指揮部</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0b0f17;
            --panel: #151b24;
            --panel-strong: #1c2430;
            --border: #303b4a;
            --text: #e6edf3;
            --muted: #8b98a9;
            --accent: #58a6ff;
            --success: #3fb950;
            --success-bg: rgba(46, 160, 67, 0.16);
            --danger: #ff7b72;
            --danger-bg: rgba(248, 81, 73, 0.16);
            --warning: #d29922;
            --warning-bg: rgba(210, 153, 34, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
            line-height: 1.5;
        }

        .app {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 36px;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }

        .title-group h1 {
            margin: 0;
            color: var(--accent);
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 800;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 15px;
        }

        .status {
            min-width: min(100%, 300px);
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            color: var(--muted);
            font-size: 14px;
            text-align: right;
        }

        .status.error {
            border-color: rgba(255, 123, 114, 0.6);
            background: var(--danger-bg);
            color: var(--danger);
        }

        .status.warning {
            border-color: rgba(210, 153, 34, 0.65);
            background: var(--warning-bg);
            color: var(--warning);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
            margin-top: 22px;
        }

        .card {
            display: grid;
            gap: 12px;
            min-height: 180px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
        }

        .card:hover {
            border-color: var(--accent);
            background: var(--panel-strong);
            transform: translateY(-2px);
        }

        .card.sample {
            border-style: dashed;
        }

        .stock-header {
            display: flex;
            align-items: start;
            justify-content: space-between;
            gap: 12px;
        }

        .stock-title {
            min-width: 0;
        }

        .stock-name {
            overflow-wrap: anywhere;
            font-size: 20px;
            font-weight: 700;
        }

        .stock-tag {
            display: inline-block;
            margin-top: 4px;
            padding: 2px 7px;
            border: 1px solid rgba(210, 153, 34, 0.45);
            border-radius: 999px;
            color: var(--warning);
            font-size: 12px;
        }

        .stock-id {
            flex: 0 0 auto;
            color: var(--muted);
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
        }

        .price {
            color: #79c0ff;
            font-family: Consolas, "Courier New", monospace;
            font-size: 28px;
            font-weight: 700;
        }

        .metric {
            color: var(--muted);
            font-size: 13px;
        }

        .signal {
            align-self: end;
            padding: 9px 10px;
            border: 1px solid transparent;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            overflow-wrap: anywhere;
        }

        .signal.success {
            border-color: rgba(63, 185, 80, 0.55);
            background: var(--success-bg);
            color: var(--success);
        }

        .signal.danger {
            border-color: rgba(255, 123, 114, 0.55);
            background: var(--danger-bg);
            color: var(--danger);
        }

        .notice {
            margin-top: 18px;
            padding: 13px 14px;
            border: 1px dashed rgba(210, 153, 34, 0.55);
            border-radius: 8px;
            background: var(--warning-bg);
            color: #d6b26d;
            font-size: 14px;
        }

        .footer {
            margin-top: 34px;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
        }

        @media (max-width: 640px) {
            .app {
                width: min(100% - 24px, 1180px);
                padding-top: 18px;
            }

            .header {
                align-items: stretch;
            }

            .status {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <header class="header">
            <div class="title-group">
                <h1>獅王戰神 V108</h1>
                <p class="subtitle">量價決策矩陣</p>
            </div>
            <div id="status" class="status" role="status" aria-live="polite">機台同步中...</div>
        </header>

        <div id="notice" class="notice" hidden></div>
        <section id="dashboard" class="dashboard" aria-label="股票訊號清單"></section>

        <footer class="footer">絕對紀律：獲利 20% 減碼、跌破 20MA 停損</footer>
    </main>

    <script>
        const SUPABASE_URL = "https://lhgtfiwrraylcfiybvew.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxoZ3RmaXdycmF5bGNmaXlidmV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODExMzQsImV4cCI6MjA5Mjk1NzEzNH0.pMlhCJ9YpCUdqmtrkAe_3rqwO_Uiy6aW6xRsz5k3Vwg";
        const REFRESH_INTERVAL_MS = 60000;
        const SAMPLE_STOCKS = [
            { id: "2330", name: "台積電", price: 985, ma20: 946.4, instruction: "多方續抱，站穩 20MA", isSample: true },
            { id: "2317", name: "鴻海", price: 156.5, ma20: 162.1, instruction: "停損觀察，跌破 20MA", isSample: true },
            { id: "2454", name: "聯發科", price: 1280, ma20: 1248.6, instruction: "量價轉強，分批布局", isSample: true }
        ];

        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const dashboard = document.getElementById("dashboard");
        const status = document.getElementById("status");
        const notice = document.getElementById("notice");

        function firstValue(record, keys, fallback = "") {
            for (const key of keys) {
                if (record[key] !== undefined && record[key] !== null && record[key] !== "") {
                    return record[key];
                }
            }
            return fallback;
        }

        function formatNumber(value) {
            const number = Number(value);
            return Number.isFinite(number) ? number.toFixed(2) : "--";
        }

        function setStatus(message, type = "normal") {
            status.textContent = message;
            status.classList.toggle("error", type === "error");
            status.classList.toggle("warning", type === "warning");
        }

        function setNotice(message = "") {
            notice.textContent = message;
            notice.hidden = message.length === 0;
        }

        function getSignalType(instruction = "") {
            return instruction.includes("🛑") || instruction.includes("停損") || instruction.includes("賣") ? "danger" : "success";
        }

        function normalizeStock(record) {
            return {
                id: firstValue(record, ["id", "stock_id", "code", "symbol"], "--"),
                name: firstValue(record, ["name", "stock_name", "title"], "未命名標的"),
                price: firstValue(record, ["price", "current_price", "close", "last_price"], null),
                ma20: firstValue(record, ["ma20", "MA20", "ma_20", "moving_average_20"], null),
                instruction: firstValue(record, ["instruction", "signal", "status", "message"], "等待訊號"),
                isSample: false
            };
        }

        function createTextElement(tagName, className, text) {
            const element = document.createElement(tagName);
            element.className = className;
            element.textContent = text;
            return element;
        }

        function createStockCard(stock) {
            const card = document.createElement("article");
            card.className = stock.isSample ? "card sample" : "card";

            const title = document.createElement("div");
            title.className = "stock-title";
            title.append(createTextElement("div", "stock-name", stock.name));

            if (stock.isSample) {
                title.append(createTextElement("span", "stock-tag", "範例資料"));
            }

            const header = document.createElement("div");
            header.className = "stock-header";
            header.append(title, createTextElement("div", "stock-id", String(stock.id)));

            const price = createTextElement("div", "price", formatNumber(stock.price));
            const ma20 = createTextElement("div", "metric", `20MA：${formatNumber(stock.ma20)}`);
            const signal = createTextElement("div", `signal ${getSignalType(stock.instruction)}`, stock.instruction);

            card.append(header, price, ma20, signal);
            return card;
        }

        function renderStocks(stocks) {
            dashboard.replaceChildren();
            const fragment = document.createDocumentFragment();
            stocks.forEach((stock) => fragment.append(createStockCard(stock)));
            dashboard.append(fragment);
        }

        async function loadData() {
            setStatus("機台同步中...");
            setNotice("");

            try {
                const { data, error } = await db
                    .from("lion_king_signals")
                    .select("*")
                    .order("id", { ascending: true });

                if (error) {
                    throw error;
                }

                const rows = Array.isArray(data) ? data : [];
                if (rows.length === 0) {
                    renderStocks(SAMPLE_STOCKS);
                    setStatus("資料庫目前 0 筆", "warning");
                    setNotice("Supabase 連線成功，但 lion_king_signals 表目前沒有資料。下方先顯示範例資料；新增資料後會自動改顯示正式資料。");
                    return;
                }

                renderStocks(rows.map(normalizeStock));
                setStatus(`正式資料 ${rows.length} 筆｜最後更新：${new Date().toLocaleString("zh-TW")}`);
            } catch (error) {
                console.error("Supabase load failed", error);
                renderStocks(SAMPLE_STOCKS);
                setStatus("連線失敗，顯示範例資料", "error");
                setNotice(`無法讀取 Supabase：${error.message || "未知錯誤"}`);
            }
        }

        loadData();
        window.setInterval(loadData, REFRESH_INTERVAL_MS);
    </script>
</body>
</html>
