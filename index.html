<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獅王戰神 V108 | 量價決策矩陣</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --signal-buy: #2ea043;
            --signal-buy-bg: rgba(46, 160, 67, 0.15);
            --signal-sell: #f85149;
            --signal-sell-bg: rgba(248, 81, 73, 0.15);
            --signal-warn: #d29922;
            --signal-warn-bg: rgba(210, 153, 34, 0.15);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header h1 {
            color: var(--accent-blue);
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .status-bar {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .stock-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.2s ease, border-color 0.2s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .stock-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stock-name {
            font-size: 22px;
            font-weight: bold;
            color: #ffffff;
        }

        .stock-id {
            font-size: 16px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .price-section {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 15px;
        }

        .current-price {
            font-size: 32px;
            font-weight: bold;
            font-family: monospace;
        }

        .tech-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .metric-item {
            background-color: rgba(255,255,255,0.03);
            padding: 8px;
            border-radius: 4px;
            text-align: center;
        }

        .metric-value {
            display: block;
            font-weight: bold;
            color: var(--text-primary);
            margin-top: 4px;
            font-family: monospace;
        }

        .signal-badge {
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .signal-buy { background: var(--signal-buy-bg); color: var(--signal-buy); border: 1px solid var(--signal-buy); }
        .signal-sell { background: var(--signal-sell-bg); color: var(--signal-sell); border: 1px solid var(--signal-sell); }
        .signal-warn { background: var(--signal-warn-bg); color: var(--signal-warn); border: 1px solid var(--signal-warn); }

        .discipline-footer {
            margin-top: 40px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>🦁 獅王戰神 V108 矩陣</h1>
            <div style="color: var(--text-secondary); margin-top: 5px; font-size: 14px;">嚴格檢視 20MA 支撐位 | 資金控管與量價結構分析</div>
        </div>
        <div id="status" class="status-bar">數據庫連線中...</div>
    </div>

    <div id="dashboard" class="dashboard-grid"></div>

    <div class="discipline-footer">
        市場操盤紀律：獲利 20% 減碼鎖利、跌破 20MA 嚴格停損。
    </div>

    <script>
        // 替換為您的 Supabase 專案 URL 與 Anon Key
        const SUPABASE_URL = "https://lhgtfiwrraylcfiybvew.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxoZ3RmaXdycmF5bGNmaXlidmV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODExMzQsImV4cCI6MjA5Mjk1NzEzNH0.pMlhCJ9YpCUdqmtrkAe_3rqwO_Uiy6aW6xRsz5k3Vwg";
        
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchMarketData() {
            const statusIndicator = document.getElementById("status");
            const dashboard = document.getElementById("dashboard");

            try {
                const { data, error } = await db.from("lion_king_signals").select("*").order("sector");
                if (error) throw error;

                if (!data || data.length === 0) {
                    statusIndicator.innerHTML = "⚠️ 尚無符合條件之籌碼數據";
                    dashboard.innerHTML = "";
                    return;
                }

                dashboard.innerHTML = "";

                data.forEach(stock => {
                    // 動態判別操盤指令顏色
                    let signalClass = "signal-buy";
                    let priceColor = "var(--signal-buy)";

                    if (stock.instruction.includes("🛑") || stock.instruction.includes("停損")) {
                        signalClass = "signal-sell";
                        priceColor = "var(--signal-sell)";
                    } else if (stock.instruction.includes("💰") || stock.instruction.includes("減碼")) {
                        signalClass = "signal-warn";
                        priceColor = "var(--signal-warn)";
                    }

                    // MACD 動能判讀
                    let macdIcon = stock.macd_hist > 0 ? "📈 正向" : "📉 負向";

                    // 建立獨立標的卡片
                    const card = document.createElement("a");
                    card.href = `https://tw.stock.yahoo.com/quote/${stock.id}.TW`;
                    card.target = "_blank";
                    card.className = "stock-card";

                    card.innerHTML = `
                        <div class="card-header">
                            <span class="stock-name">${stock.name}</span>
                            <span class="stock-id">${stock.id}</span>
                        </div>
                        <div class="price-section">
                            <span class="current-price" style="color: ${priceColor}">${Number(stock.price).toFixed(2)}</span>
                        </div>
                        <div class="tech-metrics">
                            <div class="metric-item">
                                20MA 生命線
                                <span class="metric-value">${Number(stock.ma20).toFixed(2)}</span>
                            </div>
                            <div class="metric-item">
                                MACD 動能
                                <span class="metric-value">${macdIcon}</span>
                            </div>
                        </div>
                        <div class="signal-badge ${signalClass}">
                            ${stock.instruction}
                        </div>
                    `;
                    dashboard.appendChild(card);
                });

                statusIndicator.innerHTML = `✅ 矩陣數據同步完成 | ${new Date().toLocaleTimeString('zh-TW', { hour12: false })}`;

            } catch (err) {
                statusIndicator.innerHTML = `❌ 數據庫連線異常: ${err.message}`;
            }
        }

        // 初始化並設定自動刷新頻率
        fetchMarketData();
        setInterval(fetchMarketData, 60000);
    </script>
</body>
</html>
