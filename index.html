<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獅王戰神 V108 | 終極量化決策終端</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #05070a;
            --panel-bg: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --buy-signal: #3fb950;
            --sell-signal: #f85149;
            --warn-signal: #d29922;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* 標題與系統狀態 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .sys-status {
            font-size: 13px;
            color: var(--text-dim);
            background: var(--panel-bg);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        /* 核心紀律提示欄 */
        .discipline-bar {
            background: rgba(88, 166, 255, 0.1);
            border-left: 4px solid var(--accent);
            padding: 10px 15px;
            margin-bottom: 25px;
            font-size: 14px;
        }

        /* 卡片網格佈局 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .stock-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .stock-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .stock-info .name { font-size: 18px; font-weight: 800; }
        .stock-info .id { font-size: 14px; color: var(--text-dim); margin-left: 5px; }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 15px;
        }

        .current-price { font-size: 28px; font-weight: bold; font-family: 'JetBrains Mono', monospace; }

        /* 技術指標模組 */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .metric-box {
            background: rgba(255,255,255,0.03);
            padding: 8px;
            border-radius: 4px;
            text-align: center;
        }

        .metric-label { font-size: 11px; color: var(--text-dim); display: block; }
        .metric-val { font-size: 14px; font-weight: 600; margin-top: 2px; }

        /* 指令勳章 */
        .instruction-badge {
            width: 100%;
            padding: 10px 0;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .bg-buy { background: rgba(63, 185, 80, 0.15); color: var(--buy-signal); border: 1px solid var(--buy-signal); }
        .bg-sell { background: rgba(248, 81, 73, 0.15); color: var(--sell-signal); border: 1px solid var(--sell-signal); }
        .bg-warn { background: rgba(210, 153, 34, 0.15); color: var(--warn-signal); border: 1px solid var(--warn-signal); }

        .loading { text-align: center; padding: 50px; color: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <h1>🦁 LION KING V108 COMMAND</h1>
        <div id="sync-time" class="sys-status">同步中...</div>
    </div>

    <div class="discipline-bar">
        <strong>⚔️ 市場鐵律：</strong> 跌破 20MA 無條件變現物理隔離；獲利達 20% 強制減碼 50%。
    </div>

    <div id="dashboard" class="dashboard-grid">
        <div class="loading">正在掃描核心標的宇宙與籌碼訊號...</div>
    </div>

    <script>
        // 配置 Supabase 連線 (根據您 update_data.py 的設定)
        const SB_URL = "https://lhgtfiwrraylcfiybvew.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxoZ3RmaXdycmF5bGNmaXlidmV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODExMzQsImV4cCI6MjA5Mjk1NzEzNH0.pMlhCJ9YpCUdqmtrkAe_3rqwO_Uiy6aW6xRsz5k3Vwg";
        const client = supabase.createClient(SB_URL, SB_KEY);

        async function fetchLionKingData() {
            const { data, error } = await client
                .from('lion_king_signals')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                console.error("Data fetch error:", error);
                return;
            }

            renderDashboard(data);
            document.getElementById('sync-time').innerText = `數據最後同步：${new Date().toLocaleTimeString('zh-TW', {hour12:false})}`;
        }

        function renderDashboard(stocks) {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';

            stocks.forEach(stock => {
                // 判斷訊號等級與顏色
                let badgeClass = 'bg-buy';
                if (stock.instruction.includes('🛑') || stock.instruction.includes('停損')) badgeClass = 'bg-sell';
                else if (stock.instruction.includes('💰') || stock.instruction.includes('減碼')) badgeClass = 'bg-warn';

                const card = document.createElement('div');
                card.className = 'stock-card';
                card.onclick = () => window.open(`https://tw.stock.yahoo.com/quote/${stock.id}.TW`, '_blank');

                card.innerHTML = `
                    <div class="card-header">
                        <div class="stock-info">
                            <span class="name">${stock.name}</span>
                            <span class="id">${stock.id}</span>
                        </div>
                    </div>
                    <div class="price-row">
                        <span class="current-price" style="color: ${stock.price >= stock.ma20 ? 'var(--buy-signal)' : 'var(--sell-signal)'}">
                            ${Number(stock.price).toFixed(2)}
                        </span>
                    </div>
                    <div class="metrics-grid">
                        <div class="metric-box">
                            <span class="metric-label">20MA 生命線</span>
                            <span class="metric-val">${Number(stock.ma20).toFixed(2)}</span>
                        </div>
                        <div class="metric-box">
                            <span class="metric-label">MACD 動能</span>
                            <span class="metric-val" style="color: ${stock.macd_hist > 0 ? 'var(--buy-signal)' : 'var(--sell-signal)'}">
                                ${stock.macd_hist > 0 ? '📈 正向' : '📉 偏弱'}
                            </span>
                        </div>
                    </div>
                    <div class="instruction-badge ${badgeClass}">
                        ${stock.instruction}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 初始化與定時刷新 (每分鐘)
        fetchLionKingData();
        setInterval(fetchLionKingData, 60000);
    </script>
</body>
</html>
