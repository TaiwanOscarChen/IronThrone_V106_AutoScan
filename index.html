<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獅王戰神 V108 終極指揮部</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0f17; --panel: #151b24; --border: #303b4a;
            --text: #e6edf3; --muted: #8b98a9; --accent: #58a6ff;
            --success: #3fb950; --danger: #ff7b72; --warning: #d29922;
        }
        body { background: var(--bg); color: var(--text); font-family: "Segoe UI", sans-serif; margin: 0; padding: 20px; }
        .app { max-width: 1200px; margin: 0 auto; }
        header { border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        h1 { color: var(--accent); margin: 0; }
        .status { color: var(--muted); font-size: 14px; margin-top: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; text-decoration: none; display: block; transition: 0.2s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .header-row { display: flex; justify-content: space-between; align-items: baseline; }
        .stock-name { font-size: 20px; font-weight: bold; color: var(--text); }
        .sector-tag { font-size: 12px; color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px; }
        .price { font-size: 28px; color: #79c0ff; font-family: monospace; margin: 10px 0; }
        .details { font-size: 13px; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 10px; }
        .cmd { padding: 8px; text-align: center; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .cmd-danger { background: rgba(248, 81, 73, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .cmd-warning { background: rgba(210, 153, 34, 0.15); color: var(--warning); border: 1px solid var(--warning); }
        .cmd-success { background: rgba(46, 160, 67, 0.15); color: var(--success); border: 1px solid var(--success); }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1>🦁 獅王戰神 V108 戰情室</h1>
            <div id="status" class="status">機台數據同步中...</div>
        </header>
        <div id="dashboard" class="grid"></div>
    </div>

    <script>
        // 大師已為你填入正確的 Supabase 網址與前端專用 Anon Key
        const supaUrl = "https://lhgtfiwrraylcfiybvew.supabase.co";
        const supaKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxoZ3RmaXdycmF5bGNmaXlidmV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODExMzQsImV4cCI6MjA5Mjk1NzEzNH0.pMlhCJ9YpCUdqmtrkAe_3rqwO_Uiy6aW6xRsz5k3Vwg";
        const db = supabase.createClient(supaUrl, supaKey);

        async function loadData() {
            const statusDiv = document.getElementById('status');
            try {
                const { data, error } = await db.from('lion_king_signals').select('*').order('sector');
                if (error) throw error;
                
                const dashboard = document.getElementById('dashboard');
                dashboard.innerHTML = '';
                
                data.forEach(stock => {
                    let cmdClass = "cmd-success";
                    if (stock.instruction.includes("🛑")) cmdClass = "cmd-danger";
                    else if (stock.instruction.includes("💰")) cmdClass = "cmd-warning";

                    let macdIcon = stock.macd_hist > 0 ? "📈" : "📉";

                    dashboard.innerHTML += `
                        <a href="https://tw.stock.yahoo.com/quote/${stock.id}.TW" target="_blank" class="card">
                            <div class="header-row">
                                <span class="stock-name">${stock.name} <span style="font-size:12px;color:var(--muted)">${stock.id}</span></span>
                                <span class="sector-tag">${stock.sector}</span>
                            </div>
                            <div class="price">${stock.price.toFixed(2)}</div>
                            <div class="details">
                                <span>20MA: ${stock.ma20.toFixed(2)}</span>
                                <span>MACD動能: ${macdIcon} ${stock.macd_hist.toFixed(2)}</span>
                            </div>
                            <div class="cmd ${cmdClass}">${stock.instruction}</div>
                        </a>
                    `;
                });
                statusDiv.innerText = `✅ 戰神矩陣連線正常 | 最後更新: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                statusDiv.innerText = `❌ 連線失敗: ${err.message}`;
            }
        }
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
